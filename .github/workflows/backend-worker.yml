name: Promote Backend Release

on:
  push:
    tags:
      - "backend-v*"

permissions:
  contents: write

jobs:
  promote:
    name: Promote backend tag
    runs-on: ubuntu-latest
    concurrency:
      group: backend-release
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move backend-release branch to tag commit
        run: |
          echo "Promoting ${GITHUB_REF_NAME} (${GITHUB_SHA}) to backend-release"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin "HEAD:refs/heads/backend-release" --force
