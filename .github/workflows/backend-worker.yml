name: Deploy Backend Worker

on:
  push:
    tags:
      - "backend-v*"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    environment: cloudflare

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create Wrangler config
        run: |
          : "${CLOUDFLARE_D1_DATABASE_ID:?Missing CLOUDFLARE_D1_DATABASE_ID}"
          R2_BUCKET="${CLOUDFLARE_R2_BUCKET_NAME:-auto-cert}"
          R2_BASE="${R2_PUBLIC_BASE_URL:-}"
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__D1_DATABASE_ID__|${CLOUDFLARE_D1_DATABASE_ID}|g" wrangler.toml
          sed -i "s|__R2_BUCKET_NAME__|${R2_BUCKET}|g" wrangler.toml
          sed -i "s|__R2_PUBLIC_BASE_URL__|${R2_BASE}|g" wrangler.toml
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID || vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME || vars.CLOUDFLARE_R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL || vars.R2_PUBLIC_BASE_URL }}

      - name: Type check
        run: npm run typecheck

      - name: Validate Worker secrets
        run: |
          : "${ENCRYPTION_KEY:?Missing ENCRYPTION_KEY}"
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Create Worker secrets file
        run: |
          node -e "require('node:fs').writeFileSync('.secrets.json', JSON.stringify({ ENCRYPTION_KEY: process.env.ENCRYPTION_KEY }))"
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Deploy Worker
        run: npx wrangler deploy --secrets-file .secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
