services:
  backend:
    image: ghcr.io/kohlarnhin/auto-cert-backend:latest
    container_name: auto-cert-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
